<div class="login-container">

  <h2>Login</h2>

  <input [(ngModel)]="username" placeholder="username" />
  <input [(ngModel)]="password" type="password" placeholder="password" />

  <button type="button" (click)="login()">Login</button>

  <p *ngIf="error" class="error">
    {{ error }}
  </p>

</div>
